<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <defs>
    <linearGradient id="logo-gradient" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <!-- Logomark: Abstract crystal/molecule -->
  <g transform="translate(4, 4)">
    <!-- Main hexagonal crystal shape -->
    <path d="M20 2L36 11V29L20 38L4 29V11L20 2Z" fill="url(#logo-gradient)" opacity="0.9"/>
    <!-- Inner facet lines for crystal effect -->
    <path d="M20 2L20 20L4 11Z" fill="white" opacity="0.15"/>
    <path d="M20 2L36 11L20 20Z" fill="white" opacity="0.08"/>
    <path d="M20 38L20 20L36 29Z" fill="black" opacity="0.08"/>
    <!-- Small accent nodes -->
    <circle cx="20" cy="20" r="3" fill="white" opacity="0.9"/>
    <circle cx="20" cy="2" r="2" fill="white" opacity="0.5"/>
    <circle cx="36" cy="11" r="2" fill="white" opacity="0.4"/>
    <circle cx="4" cy="11" r="2" fill="white" opacity="0.4"/>
    <circle cx="36" cy="29" r="2" fill="white" opacity="0.3"/>
    <circle cx="4" cy="29" r="2" fill="white" opacity="0.3"/>
    <circle cx="20" cy="38" r="2" fill="white" opacity="0.3"/>
    <!-- Connecting lines (molecular/network feel) -->
    <line x1="20" y1="20" x2="20" y2="2" stroke="white" stroke-width="0.8" opacity="0.3"/>
    <line x1="20" y1="20" x2="36" y2="11" stroke="white" stroke-width="0.8" opacity="0.3"/>
    <line x1="20" y1="20" x2="4" y2="11" stroke="white" stroke-width="0.8" opacity="0.3"/>
    <line x1="20" y1="20" x2="36" y2="29" stroke="white" stroke-width="0.8" opacity="0.2"/>
    <line x1="20" y1="20" x2="4" y2="29" stroke="white" stroke-width="0.8" opacity="0.2"/>
    <line x1="20" y1="20" x2="20" y2="38" stroke="white" stroke-width="0.8" opacity="0.2"/>
  </g>
  <!-- Wordmark -->
  <text x="60" y="22" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="700" font-size="22" fill="#0f172a" letter-spacing="-0.5">Salt</text>
  <text x="60" y="42" font-family="Inter, system-ui, -apple-system, sans-serif" font-weight="400" font-size="22" fill="#64748b" letter-spacing="-0.5">Labs</text>
</svg>
